# Déploiement automatique du site statique sur GitHub Pages.
# À activer une seule fois : dépôt GitHub > Settings > Pages > Source : "GitHub Actions".
name: Déploiement GitHub Pages

on:
  push:
    branches: [main]      # publie à chaque envoi sur la branche main
  workflow_dispatch:      # ... ou manuellement depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Préparation de l'artefact (tout le site, à la racine)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Mise en ligne
        id: deployment
        uses: actions/deploy-pages@v4
